env:
  DEBUG: true

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up SSH key
        uses: actions/setup-ssh@v3
        with:
          github-secret: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 16  # adjust Node.js version if needed

      - name: Deploy using SSH
        run: |
          # Connect to server using SSH
          ssh ${{ secrets.USERNAME }}@${{ secrets.IP }} -p 22 << EOF

          # Change directory to project directory
          cd /var/www/bimcopilot

          # Print Node.js and npm versions for troubleshooting
          node -v
          npm -v

          # Pull latest changes from git
          git pull origin main

          # Install or update npm dependencies
          npm install -f

          # Build production folder
          npm run build

          # Restart PM2 process
          pm2 start next

          # Restart Apache server
          systemctl restart apache2

          # End of script
          EOF

